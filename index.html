<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gynecology Tutor — Kasr Al-Ainy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --bg: #0a0f1e;
  --surface: #111827;
  --surface2: #1a2235;
  --border: #1e3a5f;
  --accent: #3b82f6;
  --accent2: #06b6d4;
  --accent3: #8b5cf6;
  --gold: #f59e0b;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-bright: #f8fafc;
  --success: #10b981;
  --danger: #ef4444;
  --warn: #f59e0b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 20%, rgba(59,130,246,0.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(139,92,246,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(6,182,212,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px 20px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Header */
header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 20px 28px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
}
header::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
}
.header-icon {
  font-size: 2.2rem;
  line-height: 1;
}
.header-text h1 {
  font-family: 'Crimson Pro', serif;
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--text-bright);
  line-height: 1.1;
}
.header-text p {
  font-size: 0.82rem;
  color: var(--text-dim);
  margin-top: 3px;
  font-family: 'JetBrains Mono', monospace;
}
.header-badge {
  margin-left: auto;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.badge {
  background: rgba(59,130,246,0.15);
  border: 1px solid rgba(59,130,246,0.3);
  color: var(--accent2);
  font-size: 0.72rem;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  white-space: nowrap;
}

/* Topic selector */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.topic-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 14px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  text-align: left;
  transition: all 0.2s ease;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  line-height: 1.3;
}
.topic-btn:hover {
  border-color: var(--accent);
  color: var(--text);
  background: var(--surface2);
  transform: translateY(-1px);
}
.topic-btn.active {
  border-color: var(--accent);
  background: rgba(59,130,246,0.12);
  color: var(--text-bright);
}
.topic-emoji { font-size: 1.2rem; flex-shrink: 0; }
.topic-label { font-weight: 500; }
.topic-pages { font-size: 0.72rem; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; margin-top: 2px; }

/* Mode selector */
.mode-bar {
  display: flex;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px;
}
.mode-btn {
  flex: 1;
  background: transparent;
  border: 1px solid transparent;
  color: var(--text-dim);
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  text-align: center;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.mode-btn:hover { border-color: var(--border); color: var(--text); background: var(--surface2); }
.mode-btn.active {
  background: rgba(59,130,246,0.15);
  border-color: rgba(59,130,246,0.4);
  color: var(--accent2);
}
.mode-icon { font-size: 1.3rem; }

/* Custom question input */
.question-box {
  display: flex;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px;
}
.question-box textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  font-size: 0.92rem;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  line-height: 1.5;
}
.question-box textarea::placeholder { color: var(--text-dim); }
.ask-btn {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  border-radius: 8px;
  color: white;
  padding: 10px 18px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.85rem;
  font-weight: 600;
  align-self: flex-end;
  transition: opacity 0.2s, transform 0.15s;
  white-space: nowrap;
}
.ask-btn:hover { opacity: 0.9; transform: scale(1.02); }
.ask-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Generate btn */
.gen-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--accent), var(--accent3));
  border: none;
  border-radius: 12px;
  color: white;
  padding: 16px 24px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: opacity 0.2s, transform 0.15s;
  letter-spacing: 0.02em;
}
.gen-btn:hover { opacity: 0.92; transform: translateY(-1px); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* Content area */
.content-area {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px;
  min-height: 200px;
  position: relative;
}

/* Loading */
.loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 48px;
  color: var(--text-dim);
}
.loading-dots {
  display: flex; gap: 8px;
}
.loading-dot {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
}
.loading-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
.loading-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
@keyframes pulse {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40% { transform: scale(1); opacity: 1; }
}
.loading p { font-size: 0.9rem; font-style: italic; }

/* Rendered content */
.rendered {
  animation: fadeIn 0.4s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.rendered h2 {
  font-family: 'Crimson Pro', serif;
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}
.rendered h3 {
  font-family: 'Outfit', sans-serif;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--accent2);
  margin: 20px 0 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.rendered p {
  line-height: 1.75;
  color: var(--text);
  margin-bottom: 12px;
  font-size: 0.95rem;
}
.rendered ul, .rendered ol {
  margin: 8px 0 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.rendered li {
  line-height: 1.6;
  color: var(--text);
  font-size: 0.93rem;
}
.rendered strong {
  color: var(--text-bright);
  font-weight: 600;
}
.rendered em {
  color: var(--gold);
  font-style: normal;
  font-family: 'Crimson Pro', serif;
  font-size: 1.05em;
}

/* Special cards in content */
.info-card {
  background: rgba(6,182,212,0.07);
  border: 1px solid rgba(6,182,212,0.2);
  border-left: 3px solid var(--accent2);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 12px 0;
}
.warn-card {
  background: rgba(245,158,11,0.07);
  border: 1px solid rgba(245,158,11,0.2);
  border-left: 3px solid var(--gold);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 12px 0;
}
.danger-card {
  background: rgba(239,68,68,0.07);
  border: 1px solid rgba(239,68,68,0.2);
  border-left: 3px solid var(--danger);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 12px 0;
}
.success-card {
  background: rgba(16,185,129,0.07);
  border: 1px solid rgba(16,185,129,0.2);
  border-left: 3px solid var(--success);
  border-radius: 8px;
  padding: 14px 16px;
  margin: 12px 0;
}

/* Quiz styles */
.quiz-question {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  margin: 12px 0;
}
.quiz-q-text {
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 14px;
  font-size: 0.95rem;
  line-height: 1.5;
}
.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.quiz-option {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  font-family: 'Outfit', sans-serif;
  font-size: 0.88rem;
  color: var(--text);
  text-align: left;
  transition: all 0.15s;
  width: 100%;
}
.quiz-option:hover { border-color: var(--accent); background: rgba(59,130,246,0.08); }
.quiz-option.correct { border-color: var(--success); background: rgba(16,185,129,0.12); color: var(--success); }
.quiz-option.wrong { border-color: var(--danger); background: rgba(239,68,68,0.08); color: var(--danger); }
.quiz-option:disabled { cursor: default; }
.quiz-feedback {
  margin-top: 10px;
  font-size: 0.85rem;
  padding: 10px 12px;
  border-radius: 6px;
  display: none;
  line-height: 1.5;
}
.quiz-feedback.show { display: block; }
.quiz-feedback.correct { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
.quiz-feedback.wrong { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }

/* Placeholder */
.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-dim);
  text-align: center;
  gap: 12px;
}
.placeholder-icon { font-size: 3rem; opacity: 0.5; }
.placeholder h3 { font-family: 'Crimson Pro', serif; font-size: 1.3rem; color: var(--text-dim); }
.placeholder p { font-size: 0.85rem; max-width: 340px; line-height: 1.6; }

/* Section label */
.section-label {
  font-size: 0.72rem;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

/* Scroll */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Streaming cursor */
.cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--accent);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

/* Table styles */
.rendered table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 0.87rem;
}
.rendered th {
  background: rgba(59,130,246,0.1);
  color: var(--accent2);
  padding: 8px 12px;
  text-align: left;
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
.rendered td {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  vertical-align: top;
}
.rendered tr:hover td { background: rgba(255,255,255,0.02); }

@media (max-width: 640px) {
  .topic-grid { grid-template-columns: 1fr 1fr; }
  .mode-bar { flex-wrap: wrap; }
  .mode-btn { flex: 0 0 calc(50% - 4px); }
  .header-badge { display: none; }
}
</style>

</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="header-icon">🏥</div>
    <div class="header-text">
      <h1>Gynecology Tutor</h1>
      <p>Kasr Al-Ainy · Essentials of Gynecology 7th Ed · 2025</p>
    </div>
    <div class="header-badge">
      <span class="badge">4th Year Med</span>
      <span class="badge">AI-Powered</span>
    </div>
  </header>

  <!-- Topic selector -->
  <div>
    <div class="section-label">📚 Choose a Topic</div>
    <div class="topic-grid" id="topicGrid"></div>
  </div>

  <!-- Mode selector -->
  <div>
    <div class="section-label">🎯 Learning Mode</div>
    <div class="mode-bar" id="modeBar">
      <button class="mode-btn active" data-mode="explain" onclick="setMode('explain',this)">
        <span class="mode-icon">🧠</span>Explain It
      </button>
      <button class="mode-btn" data-mode="clinical" onclick="setMode('clinical',this)">
        <span class="mode-icon">🩺</span>Clinical Case
      </button>
      <button class="mode-btn" data-mode="quiz" onclick="setMode('quiz',this)">
        <span class="mode-icon">✏️</span>Quiz Me
      </button>
      <button class="mode-btn" data-mode="compare" onclick="setMode('compare',this)">
        <span class="mode-icon">⚖️</span>Compare
      </button>
      <button class="mode-btn" data-mode="traps" onclick="setMode('traps',this)">
        <span class="mode-icon">⚠️</span>Exam Traps
      </button>
    </div>
  </div>

  <!-- Custom question -->
  <div class="question-box">
    <textarea id="customQ" placeholder="Ask anything about gynecology… e.g. 'Why does PCOS cause infertility?' or 'Explain the menstrual cycle like I'm 10'" rows="2"></textarea>
    <button class="ask-btn" id="askBtn" onclick="askCustom()">Ask →</button>
  </div>

  <!-- Generate button -->
  <button class="gen-btn" id="genBtn" onclick="generate()">
    <span>⚡</span> <span id="genBtnText">Select a topic to start learning</span>
  </button>

  <!-- Content area -->
  <div class="content-area" id="contentArea">
    <div class="placeholder">
      <div class="placeholder-icon">🔬</div>
      <h3>Your AI Tutor is Ready</h3>
      <p>Pick a topic above, choose how you want to learn it, then hit Generate — or ask your own question directly.</p>
    </div>
  </div>

</div>

<script>
const TOPICS = [
  { emoji: '🦴', label: 'Anatomy & Embryology', pages: 'pp. 3–23', key: 'anatomy_embryology' },
  { emoji: '🔄', label: 'Menstrual Cycle', pages: 'pp. 24–32', key: 'menstrual_cycle' },
  { emoji: '😣', label: 'Dysmenorrhea & PMS', pages: 'pp. 33–35', key: 'dysmenorrhea_pms' },
  { emoji: '🌱', label: 'Puberty', pages: 'pp. 36–38', key: 'puberty' },
  { emoji: '🍂', label: 'Menopause & HRT', pages: 'pp. 39–44', key: 'menopause_hrt' },
  { emoji: '🚫', label: 'Amenorrhea', pages: 'pp. 45–53', key: 'amenorrhea' },
  { emoji: '🍼', label: 'Hyperprolactinemia', pages: 'pp. 54–55', key: 'hyperprolactinemia' },
  { emoji: '🫧', label: 'PCOS', pages: 'pp. 56–62', key: 'pcos' },
  { emoji: '💉', label: 'Infertility & ART', pages: 'pp. 66–75', key: 'infertility_art' },
  { emoji: '🛡️', label: 'Contraception', pages: 'pp. 80–91', key: 'contraception' },
  { emoji: '🦠', label: 'Vaginal Infections', pages: 'pp. 92–99', key: 'vaginal_infections' },
  { emoji: '🔥', label: 'PID & STIs', pages: 'pp. 100–115', key: 'pid_stis' },
  { emoji: '↘️', label: 'Pelvic Organ Prolapse', pages: 'pp. 116–124', key: 'prolapse' },
  { emoji: '💧', label: 'Urinary Incontinence', pages: 'pp. 125–135', key: 'incontinence' },
  { emoji: '🩸', label: 'AUB & Fibroids', pages: 'pp. 137–149', key: 'aub_fibroids' },
  { emoji: '🌿', label: 'Endometriosis', pages: 'pp. 150–158', key: 'endometriosis' },
  { emoji: '🎗️', label: 'Endometrial Cancer', pages: 'pp. 164–168', key: 'endometrial_cancer' },
  { emoji: '🔴', label: 'Cervical Cancer & CIN', pages: 'pp. 169–178', key: 'cervical_cancer' },
  { emoji: '🫧', label: 'Ovarian Tumours', pages: 'pp. 182–197', key: 'ovarian_tumours' },
  { emoji: '🔭', label: 'Imaging & Endoscopy', pages: 'pp. 202–214', key: 'imaging_endoscopy' },
];

const MODES = {
  explain: {
    label: 'deep explanation with analogies',
    prompt: (topic) => `You are a brilliant medical tutor at Kasr Al-Ainy, Cairo University, teaching a 4th-year medical student who knows NOTHING about gynecology yet. 

Topic: **${topic}**

Give a crystal-clear explanation following this structure:

## What Is It? (Simple Definition)
Start with a single sentence anyone could understand. Use a real-world analogy if helpful.

## The Biology / Mechanism (Why/How)
Explain the underlying physiology or pathology in logical steps. Use cause-and-effect language ("because... therefore..."). Connect it to things they already know from basic sciences.

## Key Facts to Know
The 5–7 most important clinical facts. Use ⭐ for high-yield, 🔴 for red flags.

## How to Remember It
Give a mnemonic, analogy, or memorable story that makes this stick.

## Quick Summary
3 bullet points that capture the whole topic.

Write in a warm, engaging, mentor tone. Use **bold** for key terms. Keep paragraphs short. This is for a student with zero prior knowledge — be clear, not condescending.`
  },
  clinical: {
    label: 'clinical case scenario',
    prompt: (topic) => `You are a Kasr Al-Ainy clinical tutor. Present a realistic clinical case about: **${topic}**

Structure it as:

## 🏥 The Patient
Present the case: age, complaints, duration, relevant history (2–3 sentences, realistic Egyptian clinical setting)

## 🔍 What's Happening? (Step-by-Step Reasoning)
Walk through the clinical thinking:
1. What does the presentation suggest?
2. What is the underlying mechanism causing these symptoms?
3. What are you thinking as a doctor?

## 🧪 Investigations
What would you order and WHY? What results would you expect?

## 💊 Management
Treatment plan with reasoning. Not just WHAT — explain WHY each step.

## 📌 Teaching Points
3 key lessons this case teaches. Include one ⚠️ common trap to avoid.

## ❓ Test Yourself
One viva-style question a professor might ask about this case.

Make the case realistic and memorable. The student has ZERO prior gynecology knowledge — explain every medical term you use.`
  },
  quiz: {
    label: 'quiz questions with answers',
    prompt: (topic) => `Create 5 exam-style quiz questions about: **${topic}** for a 4th-year medical student at Kasr Al-Ainy.

Mix of styles: some MCQ-style (mark the best answer), some short-answer, some clinical vignette.

For EACH question:

**Q[N]: [The Question]**

Options (if MCQ):
A) ...
B) ...
C) ...
D) ...

**Answer:** [Correct answer + letter if MCQ]

**Explanation:** [2–3 sentences explaining WHY this is correct AND why the others are wrong. Connect to the underlying mechanism.]

**Exam Tip:** [One sentence on what professors love to ask about this topic]

---

Make questions progressively harder. Start with a basic factual question, end with a clinical reasoning question. The student is a beginner — explanations should be detailed and educational, not just confirmatory.`
  },
  compare: {
    label: 'comparison with similar conditions',
    prompt: (topic) => `The student needs to understand **${topic}** by comparing it with similar or related conditions they might confuse it with.

## The Core Concept
One paragraph explaining what ${topic} is in the simplest possible terms.

## The Confusing Conditions
List 2–4 conditions that students commonly mix up with this topic.

## Side-by-Side Comparison
Create a clear comparison covering:
- Definition / mechanism
- Who gets it (patient profile)
- Key symptoms
- Key investigations
- Treatment
- Classic exam clue (the "giveaway" feature)

## Memory Trick
A way to remember which is which.

## The Differentiating Question
"The one question you should ask yourself to tell them apart is: ___"

Write for a beginner. Explain every term. Use clear formatting.`
  },
  traps: {
    label: 'common exam mistakes and traps',
    prompt: (topic) => `You are an exam-savvy Kasr Al-Ainy tutor. Reveal the most common mistakes students make about: **${topic}**

## 🎯 The Big Picture (What students often misunderstand)
The single most important concept students get wrong, and why.

## ⚠️ Common Traps (5–7 specific pitfalls)
For each trap:
**Trap [N]: [Catchy name for the trap]**
- ❌ What students think: ...
- ✅ What's actually true: ...
- 💡 Why this matters clinically: ...

## 🔴 Red Flags Students Miss
Clinical warning signs that are easy to overlook but critical to know.

## ✏️ Exam Favourite Questions
3 questions professors love to ask about this topic, and the perfect answer.

## 📝 The "Never Forget" Rules
3–5 absolute rules about this topic that you must never get wrong in an exam or clinic.

Write for a complete beginner. Be specific — vague advice is useless. The traps should feel like insider tips from someone who has seen hundreds of students fail on these exact points.`
  }
};

let selectedTopic = null;
let selectedMode = 'explain';

// Build topic grid
const grid = document.getElementById('topicGrid');
TOPICS.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'topic-btn';
  btn.innerHTML = `<span class="topic-emoji">${t.emoji}</span><div><div class="topic-label">${t.label}</div><div class="topic-pages">${t.pages}</div></div>`;
  btn.onclick = () => selectTopic(t, btn);
  grid.appendChild(btn);
});

function selectTopic(topic, btn) {
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTopic = topic;
  document.getElementById('genBtnText').textContent = `Generate: ${topic.label}`;
}

function setMode(mode, btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedMode = mode;
}

async function generate() {
  if (!selectedTopic) {
    showError('Please select a topic first!');
    return;
  }
  const modeConfig = MODES[selectedMode];
  const prompt = modeConfig.prompt(selectedTopic.label + ' (from Kasr Al-Ainy Essentials of Gynecology)');
  await fetchAndRender(prompt);
}

async function askCustom() {
  const q = document.getElementById('customQ').value.trim();
  if (!q) return;
  const context = selectedTopic ? ` (in the context of ${selectedTopic.label})` : ' in gynecology';
  const prompt = `You are a brilliant gynecology tutor at Kasr Al-Ainy teaching a 4th-year medical student who is a complete beginner.

The student asks: "${q}"${context}

Answer clearly and thoroughly:
- Start with the simplest possible explanation
- Use analogies where helpful
- Explain all medical terms you use
- Use **bold** for key terms
- Include clinical relevance where appropriate
- End with 1–2 key takeaway points

Write in a warm, mentor tone. The student knows NOTHING yet — be clear, educational, and encouraging.`;
  await fetchAndRender(prompt);
}

// Allow Enter (without Shift) to submit
document.getElementById('customQ').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    askCustom();
  }
});

function showError(msg) {
  document.getElementById('contentArea').innerHTML = `
    <div style="text-align:center;padding:40px;color:var(--danger)">
      <div style="font-size:2rem">⚠️</div>
      <p style="margin-top:8px">${msg}</p>
    </div>`;
}

async function fetchAndRender(prompt) {
  const contentArea = document.getElementById('contentArea');
  const genBtn = document.getElementById('genBtn');
  const askBtn = document.getElementById('askBtn');

  // Show loading
  contentArea.innerHTML = `
    <div class="loading">
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
      <p>Your tutor is thinking…</p>
    </div>`;
  genBtn.disabled = true;
  askBtn.disabled = true;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1800,
        system: `You are an expert gynecology tutor at Kasr Al-Ainy, Faculty of Medicine, Cairo University. 
You are teaching 4th-year medical students using the "Essentials of Gynecology, 7th Edition 2025."
Your teaching style: clear, logical, warm, mentor-like. You explain the WHY behind everything.
You use **bold** for key terms, ⭐ for high-yield facts, 🔴 for red flags, ⚠️ for exam traps.
Always connect theory to clinical practice. Make concepts memorable with analogies.`,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const text = data.content?.map(b => b.text || '').join('') || '';
    contentArea.innerHTML = `<div class="rendered">${renderMarkdown(text)}</div>`;

    // If quiz mode, attach interactivity
    if (selectedMode === 'quiz') attachQuizInteractivity();

  } catch (err) {
    contentArea.innerHTML = `
      <div style="text-align:center;padding:40px;color:var(--danger)">
        <div style="font-size:2rem">⚠️</div>
        <p style="margin-top:8px;font-size:0.9rem">Error: ${err.message}</p>
      </div>`;
  } finally {
    genBtn.disabled = false;
    askBtn.disabled = false;
  }
}

function renderMarkdown(text) {
  // Tables
  text = text.replace(/\|(.+)\|\n\|[-| :]+\|\n((?:\|.+\|\n?)*)/g, (match, header, rows) => {
    const ths = header.split('|').filter(c => c.trim()).map(c => `<th>${c.trim()}</th>`).join('');
    const trs = rows.trim().split('\n').map(row => {
      const tds = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
      return `<tr>${tds}</tr>`;
    }).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // Headings
  text = text.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  text = text.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  text = text.replace(/^#### (.+)$/gm, '<h3>$1</h3>');

  // Bold/italic
  text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

  // Special callout markers
  text = text.replace(/⭐ (.+)/g, '<div class="info-card">⭐ $1</div>');
  text = text.replace(/🔴 (.+)/g, '<div class="danger-card">🔴 $1</div>');
  text = text.replace(/⚠️ (.+)/g, '<div class="warn-card">⚠️ $1</div>');
  text = text.replace(/💡 (.+)/g, '<div class="success-card">💡 $1</div>');

  // Horizontal rule
  text = text.replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:20px 0">');

  // Numbered list
  text = text.replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>');
  text = text.replace(/(<li>[\s\S]*?<\/li>)(?=\s*<li>)/g, '$1');
  text = text.replace(/(<li>.*<\/li>)/gs, (match) => {
    if (match.includes('<ol>')) return match;
    return `<ol>${match}</ol>`;
  });

  // Bullet list
  text = text.replace(/^[•\-\*] (.+)$/gm, '<li>$1</li>');

  // Wrap consecutive li not in ol into ul
  text = text.replace(/(<li>(?!.*<ol>)[\s\S]*?<\/li>\n?)+/g, match => {
    if (match.includes('<ol>') || match.includes('<ul>')) return match;
    return `<ul>${match}</ul>`;
  });

  // Paragraphs (lines not already wrapped)
  const lines = text.split('\n');
  const processed = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) { processed.push(''); continue; }
    if (/^<(h[23456]|ul|ol|li|div|table|thead|tbody|tr|th|td|hr)/.test(trimmed)) {
      processed.push(trimmed);
    } else {
      processed.push(`<p>${trimmed}</p>`);
    }
  }
  return processed.join('\n');
}

function attachQuizInteractivity() {
  // Parse options and make them clickable
  const content = document.querySelector('.rendered');
  if (!content) return;
  
  // Find option lines like "A) ..." or "a) ..."
  const optionPattern = /^([A-Da-d]\))\s+(.+)$/;
  const paragraphs = content.querySelectorAll('p');
  
  paragraphs.forEach(p => {
    const text = p.textContent.trim();
    const match = text.match(optionPattern);
    if (match) {
      const btn = document.createElement('button');
      btn.className = 'quiz-option';
      btn.textContent = text;
      btn.dataset.option = match[1].toLowerCase();
      
      // Look for correct answer in sibling text
      btn.addEventListener('click', function() {
        const allOptions = this.closest('.quiz-question') || this.parentElement;
        // Simple feedback - check if next sibling p contains "Answer:" with this letter
        const correctText = findAnswerText(this);
        
        const siblings = document.querySelectorAll('.quiz-option');
        siblings.forEach(s => {
          s.disabled = true;
          if (s === this) {
            const isCorrect = correctText && correctText.toLowerCase().includes(this.dataset.option.charAt(0));
            s.classList.add(isCorrect ? 'correct' : 'wrong');
            // Show feedback
            const fb = document.createElement('div');
            fb.className = `quiz-feedback show ${isCorrect ? 'correct' : 'wrong'}`;
            fb.textContent = isCorrect ? '✓ Correct!' : `✗ That's not right. Check the answer below.`;
            s.after(fb);
          }
        });
      });
      
      p.replaceWith(btn);
    }
  });
}

function findAnswerText(optionBtn) {
  // Look for "Answer:" text after options
  let next = optionBtn.nextElementSibling;
  while (next && !next.textContent.includes('Answer:')) {
    next = next.nextElementSibling;
  }
  return next ? next.textContent : null;
}
</script>
